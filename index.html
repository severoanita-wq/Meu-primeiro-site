<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Infantil - 50 Atividades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
            background: linear-gradient(135deg, #f9f0c1 0%, #f7e6b5 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #4a6fa5;
            font-size: 2.8em;
            text-shadow: 3px 3px 0 #ffb347;
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header p {
            color: #6b4f3c;
            font-size: 1.3em;
            background-color: rgba(255, 255, 255, 0.5);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px dashed #ff9a3c;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
            background-color: #ffd78c;
            padding: 25px;
            border-radius: 50px 50px 30px 30px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), inset 0 0 20px #ffe4a1;
            border: 5px solid #fbaa4b;
        }

        .gallery-item {
            aspect-ratio: 1 / 1;
            background-color: #fff9e6;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 0 #bb8f4f, 0 10px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 3px solid white;
            position: relative;
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 12px 0 #9e7a44, 0 15px 20px rgba(0, 0, 0, 0.3);
            border-color: #ffd966;
            z-index: 10;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Placeholder para imagens sem link */
        .gallery-item img[src=""] {
            opacity: 0.3;
            background: linear-gradient(45deg, #ffb347 25%, #ffe28a 50%, #ffb347 75%);
            background-size: 200% 200%;
        }

        .gallery-item::after {
            content: "✨";
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 18px;
            opacity: 0.5;
            text-shadow: 0 2px 2px white;
            pointer-events: none;
        }

        .gallery-item:nth-child(odd)::after {
            content: "🎨";
        }

        .gallery-item:nth-child(3n)::after {
            content: "📚";
        }

        .gallery-item:nth-child(5n)::after {
            content: "🧸";
        }

        .gallery-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 1.2em;
            color: #5e4b3a;
            background-color: #ffeab3;
            padding: 15px;
            border-radius: 60px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            border: 3px solid #ffae42;
        }

        .counter {
            background-color: #ff6f61;
            color: white;
            border-radius: 30px;
            padding: 5px 15px;
            display: inline-block;
            font-weight: bold;
            margin: 0 5px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(8, 1fr);
            }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(6, 1fr);
                gap: 12px;
            }
            .header h1 {
                font-size: 2.2em;
            }
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
                padding: 15px;
            }
            .header h1 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 400px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Instruções visuais */
        .instruction {
            background-color: #b0e0e6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 4px solid #4682b4;
            color: #27476e;
            text-align: center;
        }

        .instruction code {
            background-color: #27476e;
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 1.1em;
        }
    </style>
</head>
